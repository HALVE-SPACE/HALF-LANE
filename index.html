<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Webpage with Nav, Image, and Animated Square</title>
  <style>
    /* -------------------------
       Base styles
    --------------------------*/
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.5;
      color: #111827;
      background: #ffffff;
    }

    /* -------------------------
       Header / Navigation
    --------------------------*/
    header {
      background: #0f172a; /* dark slate */
      color: #fff;
    }
    nav {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
    }
    .brand {
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: 0.3px;
    }
    .menu {
      list-style: none;
      display: flex;
      gap: 1rem;
      margin: 0;
      padding: 0;
    }
    .menu a {
      color: #e5e7eb;
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      transition: background 0.2s, color 0.2s;
    }
    .menu a:hover,
    .menu a:focus {
      background: #1f2937;
      color: #ffffff;
      outline: none;
    }

    /* -------------------------
       Main content layout
    --------------------------*/
    main {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    h1 { margin-top: 0.5rem; }

    /* -------------------------
       Hero image block
    --------------------------*/
    .hero {
      margin: 1rem 0 2rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
    }
    .hero img {
      display: block;
      width: 100%;
      height: auto;
    }
    .caption {
      font-size: 0.9rem;
      color: #6b7280;
      padding: 0.5rem 0.75rem 0.75rem;
    }

    /* -------------------------
       Features row: list + red box
    --------------------------*/
    .features-grid {
      display: grid;
      grid-template-columns: 1fr auto; /* list grows, box sized */
      align-items: start;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    /* black square */
    .black-square {
      width: 120px;
      height: 60px;
      background: #000;
      position: absolute;
      inset: 0; /* top/right/bottom/left: 0 */
      margin: auto;
      border-radius: 2px;

      /* --- Flick (random jitter) animation via CSS var --- */
      transform: translateX(var(--dx, 0px));
      transition: transform 120ms ease-in-out;
    }

    /* If user prefers reduced motion, keep it still */
    @media (prefers-reduced-motion: reduce) {
      .red-box .black-square {
        transition: none !important;
        transform: none !important;
      }
